contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
  packages:
    - wolfi-baselayout
    - glibc
    - ca-certificates-bundle
    - tzdata

accounts:
  groups:
    - groupname: berth
      gid: 65532
  users:
    - username: berth
      uid: 65532
      gid: 65532
  run-as: 65532

entrypoint:
  command: /app/berth

work-dir: /app

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /app/public
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /app/templates
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

archs:
  - x86_64
  - aarch64
